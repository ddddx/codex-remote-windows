<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Remote 会话</title>
    <link rel="stylesheet" href="/style.css?v=19" />
  </head>
  <body>
    <div class="bg"></div>
    <main class="app">
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <h2>会话</h2>
          <button id="sidebarClose" class="btn-icon">✕</button>
        </div>
        <div id="tabList" class="tab-list"></div>
        <button id="newTabBtn" class="btn" style="width:100%;margin-top:8px">+ 新建会话</button>
      </aside>

      <div class="main-area">
        <header class="topbar">
          <button id="menuBtn" class="btn-icon">☰</button>
          <h1 id="activeTitle">Codex Remote Control</h1>
          <label class="theme-select-group" for="themeSelect">
            <span>主题</span>
            <select id="themeSelect"></select>
          </label>
          <button id="tokenBtn" class="btn btn-secondary btn-inline" type="button">Token</button>
          <span id="activeStatus" class="status-badge"></span>
        </header>

        <section class="panel">
          <div id="messages" class="messages"></div>
          <div id="sessionCreatingOverlay" class="session-creating-overlay" aria-hidden="true">
            <div class="session-creating-card">
              <div class="session-creating-dots" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
              </div>
              <div class="session-creating-title">正在新建会话</div>
              <div class="session-creating-text">正在创建 Codex 会话并拉起本地窗口，请稍候...</div>
            </div>
          </div>
          <form id="composer" class="composer">
            <div class="composer-controls">
              <label class="composer-select-group">
                <span>模型</span>
                <select id="modelSelect"></select>
              </label>
              <label class="composer-select-group">
                <span>思考等级</span>
                <select id="reasoningEffortSelect"></select>
              </label>
            </div>
            <div class="composer-input-row">
              <textarea id="promptInput" placeholder="给当前会话发送指令..." rows="3"></textarea>
              <button type="submit" class="btn">发送</button>
            </div>
          </form>
        </section>
      </div>
    </main>

    <div id="textModal" class="modal" aria-hidden="true">
      <div class="modal-backdrop" data-modal-close="true"></div>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <form id="textModalForm">
          <h2 id="modalTitle" class="modal-title">新建会话</h2>
          <label id="modalLabel" class="modal-label" for="modalInput">会话名称</label>
          <input id="modalInput" class="modal-input" type="text" maxlength="120" placeholder="可留空" />
          <div class="modal-actions">
            <button id="modalCancelBtn" class="btn btn-secondary" type="button">取消</button>
            <button id="modalConfirmBtn" class="btn" type="submit">确定</button>
          </div>
        </form>
      </div>
    </div>

    <div id="sessionModal" class="modal" aria-hidden="true">
      <div class="modal-backdrop" data-session-modal-close="true"></div>
      <div class="modal-card session-modal-card" role="dialog" aria-modal="true" aria-labelledby="sessionModalTitle">
        <form id="sessionModalForm">
          <h2 id="sessionModalTitle" class="modal-title">新建会话</h2>
          <label class="modal-label" for="sessionNameInput">会话名称</label>
          <input id="sessionNameInput" class="modal-input" type="text" maxlength="120" placeholder="可留空" />

          <label class="modal-label session-workspace-label" for="sessionWorkspaceInput">工作区目录</label>
          <div class="session-path-row">
            <input id="sessionWorkspaceInput" class="modal-input session-path-input" type="text" placeholder="请输入或选择主机上的工作区目录" />
            <button id="browseWorkspaceBtn" class="btn btn-secondary" type="button">进入路径</button>
          </div>

          <div class="session-workspace-actions">
            <button id="workspaceUpBtn" class="btn btn-secondary" type="button">上级目录</button>
            <button id="workspaceRefreshBtn" class="btn btn-secondary" type="button">刷新</button>
            <button id="createWorkspaceBtn" class="btn btn-secondary" type="button">新建文件夹</button>
            <button id="useCurrentWorkspaceBtn" class="btn" type="button">使用当前目录</button>
          </div>

          <div id="workspaceShortcutList" class="workspace-shortcut-list"></div>
          <div class="workspace-browser">
            <div id="workspaceBrowserPath" class="workspace-browser-path"></div>
            <div id="workspaceBrowserList" class="workspace-browser-list"></div>
          </div>
          <div id="sessionModalHint" class="modal-label session-modal-hint">支持直接输入主机路径，也可以用下面的快捷路径。</div>

          <div class="modal-actions">
            <button id="sessionModalCancelBtn" class="btn btn-secondary" type="button">取消</button>
            <button id="sessionModalConfirmBtn" class="btn" type="submit">创建</button>
          </div>
        </form>
      </div>
    </div>

    <template id="tabTpl">
      <button class="tab-item">
        <span class="name"></span>
        <span class="workspace"></span>
        <span class="meta"></span>
        <span class="close">×</span>
      </button>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js" crossorigin="anonymous"></script>
    <script type="module" src="/app.js?v=25"></script>
  </body>
</html>
